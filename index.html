<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citizen Request</title>
</head>

<body>

<main id="main">
<div class="container">

<article id="entry">

<h1 id="page-title">Citizen Request</h1>

<div id="post">

<form id="citizenForm">

<table border="0" cellpadding="2">

<tbody>

<!-- Department -->
<tr>
<td>Department to send issue to:</td>
<td>
<select id="department" required>
  <option value="">-- Select Department --</option>
  <option value="jagycoslpoer@gmail.com">City Manager’s Office</option>
  <option value="jonahwest77@gmail.com">Assistant City Manager, HR</option>
  <option value="Finance">Finance Department</option>
  <option value="Assessor">Assessor</option>
  <option value="Building">Building Department</option>
  <option value="Code Enforcement">Code Enforcement</option>
  <option value="Clerk">City Clerk</option>
  <option value="Utilities">Utility Billing</option>
  <option value="Fire">Fire Department (non-emergency)</option>
  <option value="Police">Police (non-emergency)</option>
  <option value="DPS">Department of Public Services</option>
</select>
</td>
</tr>

<!-- Name -->
<tr>
<td>Your Name:</td>
<td><input type="text" id="name" required></td>
</tr>

<!-- Email -->
<tr>
<td>Email Address:</td>
<td><input type="email" id="email" required></td>
</tr>

<!-- Phone -->
<tr>
<td>Phone:</td>
<td><input type="text" id="phone" required></td>
</tr>

<!-- Issue -->
<tr>
<td>Issue:</td>
<td><textarea id="issue" rows="6" required></textarea></td>
</tr>

<!-- Response -->
<tr>
<td>Please respond to me via:</td>
<td>
<label><input type="radio" name="response" value="Email" required> Email</label>
<label><input type="radio" name="response" value="Phone"> Phone</label>
</td>
</tr>

<!-- Submit -->
<tr>
<td colspan="2" align="center">
<button type="submit">Submit</button>
<button type="reset">Reset</button>
</td>
</tr>

</tbody>
</table>

</form>

</div>

</article>

</div>
</main>

<!-- Backend connection -->
<script>
document.getElementById("citizenForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const responseMethod = document.querySelector('input[name="response"]:checked')?.value;

  const data = {
    department: document.getElementById("department").value,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    issue: document.getElementById("issue").value,
    response: responseMethod
  };

  try {
    const res = await fetch("https://citywebsitetest.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      alert("Request submitted successfully.");
      document.getElementById("citizenForm").reset();
    } else {
      alert("Error submitting request.");
    }

  } catch (err) {
    alert("Server not reachable.");
  }
});
</script>

</body>
</html>
